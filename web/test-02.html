<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width">
    <link rel="shortcut icon" href="/img/favicon.ico">
    <script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>

    <script src="lib/jsplumb.js"></script>
    <script src="app.js"></script>
    <script src="js/jquery.validate.js"></script>
    <script src="js/additional-methods.js"></script>

    <title>jsPlumb Toolkit - build Flowcharts, Diagrams and connectivity based applications fast</title>
    <link href="//fonts.googleapis.com/css?family=Lato:400,700" rel="stylesheet">

    <link href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="css/jsplumbtoolkit-defaults.css">
    <link rel="stylesheet" href="css/jsplumbtoolkit-demo.css">

    <link rel="stylesheet" href="app.css">

    <script type="text/javascript">
        let extractor;
        let transformer;
        let loader;

        function addItem() {
            extractor = $('<div>', { id: 'flowchartWindow4', class: 'window jtk-node' }).html('<center><strong>Some</strong><br/><label>Extractor</label></center>').appendTo('#canvas');
            transformer = $('<div>', { id: 'flowchartWindow5', class: 'window jtk-node' }).html('<center><strong>Some</strong><br/><label>Transformer</label></center>').appendTo('#canvas');
            loader = $('<div>', { id: 'flowchartWindow6', class: 'window jtk-node' }).html('<center><strong>Some</strong><br/><label>Loader</label></center>').appendTo('#canvas');

            instance._addEndpoints('Window4', ['RightMiddle'], []);
            instance._addEndpoints('Window5', ['RightMiddle'], ['LeftMiddle']);
            instance._addEndpoints('Window6', [], ['LeftMiddle']);

            instance.draggable(instance.getSelector('.flowchart-demo .window'), { grid: [20, 20] });
        }

        function removeItem() {
            // This will delete the node and its connections.
            instance.remove("flowchartWindow6");

            // This will delete the nodes associated to the endpoint.
            instance.removeAllEndpoints("flowchartWindow6");
        }
    </script>
</head>

<body class="jtk-bootstrap jtk-bootstrap-wide">
<div class="jtk-header">
    <div class="social-nav hidden-xs">
        <style>
            .btn-try {
                background-color: #489ea5;
                border-radius: 3px;
                padding: 4px 10px;
                color: white;
                outline: none;
                border: none;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 17px;
            }

            .btn-try:hover {
                background-color: #5eb4bb;
            }

            .btn-try a {
                color: whitesmoke;
                text-decoration: none;
            }

            .btn-try:hover a {
                color: white;
            }
        </style>
    </div>
</div>
<div class="jtk-page-container">
    <div class="jtk-container">
        <div class="jtk-demo-main">
            <div class="jtk-demo-canvas canvas-wide flowchart-demo jtk-surface jtk-surface-nopan" id="canvas">
                <div class="window jtk-node" id="flowchartWindow1"><center><strong>Csv</strong><br/><label>Extractor</label></center></div>
                <div class="window jtk-node" id="flowchartWindow2"><center><strong>Rename Columns</strong><br/><label>Transformer</label></center></div>
                <div class="window jtk-node" id="flowchartWindow3"><center><strong>Database</strong><br/><label>Loader</label></center></div>
            </div>
        </div>

        <div class="full-width-container">
            <div class="container">
                <div class="description">
                    <h4>Some title</h4>
                    <p>Some text goes here.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
